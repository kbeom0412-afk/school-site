<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>욕지중학교</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: white;
    }

    /* 헤더 */
    header {
      background-color: white;
      padding: 15px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    /* 메뉴 */
    nav {
      background-color: skyblue;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    /* 메인 영역 */
    main {
      display: flex;
      justify-content: space-around;
      padding: 20px;
    }

    /* 박스 */
    .box {
      width: 45%;
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
    }

    /* 표 스타일 */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #f0f0f0;
    }

  </style>
</head>

<body>

  <!-- 헤더 -->
  <header>
    <h1>욕지중학교</h1>
  </header>

  <!-- 메뉴 -->
  <nav>
    <a href="#">홈</a>
    <a href="#">공지사항</a>
    <a href="#">시간표</a>
    <a href="#">급식</a>
  </nav>

  <!-- 메인 -->
  <main>

    <!-- 시간표 -->
    <div class="box">
      <h2>시간표</h2>
      <table>
        <tr>
          <th>교시</th>
          <th>과목</th>
        </tr>
        <tr>
          <td>1교시</td>
          <td>미정</td>
        </tr>
        <tr>
          <td>2교시</td>
          <td>미정</td>
        </tr>
        <tr>
          <td>3교시</td>
          <td>미정</td>
        </tr>
      </table>
    </div>

    <!-- 급식 -->
    <div class="box">
      <h2>급식표</h2>
      <table>
        <tr>
          <th>날짜</th>
          <th>메뉴</th>
        </tr>
        <tr>
          <td>월요일</td>
          <td>미정</td>
        </tr>
        <tr>
          <td>화요일</td>
          <td>미정</td>
        </tr>
        <tr>
          <td>수요일</td>
          <td>미정</td>
        </tr>
      </table>
    </div>

  </main>

</body>
</html>
