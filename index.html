<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>욕지중학교</title>

<!-- 🔥 모바일 필수 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* 상단 */
header {
  background: #2c3e50;
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 28px;
}

/* 박스 */
.box {
  width: 90%;
  margin: 20px auto;
  padding: 20px;
  border: 1px solid #ddd;
  border-radius: 10px;
}

/* 날짜 */
.date-nav {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-bottom: 10px;
}

.arrow {
  cursor: pointer;
  font-size: 24px;
}

/* 버튼 */
button {
  margin: 5px;
  padding: 10px;
  cursor: pointer;
}

/* 🔥 모바일 최적화 */
@media (max-width: 600px) {

  header {
    font-size: 20px;
    padding: 15px;
  }

  .box {
    width: 95%;
    padding: 15px;
  }

  button {
    width: 100%;
    margin: 5px 0;
    font-size: 16px;
  }

  .arrow {
    font-size: 20px;
  }

  #meal {
    font-size: 14px;
    line-height: 1.6;
  }

  #timetable {
    font-size: 16px;
  }
}
</style>
</head>

<body>

<header>욕지중학교</header>

<!-- 🍱 급식 -->
<div class="box">
  <h2>급식</h2>

  <div class="date-nav">
    <div class="arrow" onclick="changeDate(-1)">◀</div>
    <div id="dateText"></div>
    <div class="arrow" onclick="changeDate(1)">▶</div>
  </div>

  <p id="meal">불러오는 중...</p>
</div>

<!-- 📚 시간표 -->
<div class="box">
  <h2>시간표</h2>

  <button onclick="showGrade(1)">1학년</button>
  <button onclick="showGrade(2)">2학년</button>
  <button onclick="showGrade(3)">3학년</button>

  <div id="timetable">학년을 선택하세요</div>
</div>

<script>
const API_KEY = "여기에_너의_키";

// 날짜
let currentDate = new Date();

function updateDateText() {
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth() + 1;
  const d = currentDate.getDate();

  document.getElementById("dateText").innerText =
    `${y}년 ${m}월 ${d}일`;

  getMeal();
}

function changeDate(num) {
  currentDate.setDate(currentDate.getDate() + num);
  updateDateText();
}

// 급식
function getMeal() {
  const y = currentDate.getFullYear();
  const m = String(currentDate.getMonth()+1).padStart(2,'0');
  const d = String(currentDate.getDate()).padStart(2,'0');

  const date = `${y}${m}${d}`;

  fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${API_KEY}&Type=json&pIndex=1&pSize=10&ATPT_OFCDC_SC_CODE=S10&SD_SCHUL_CODE=9071093&MLSV_YMD=${date}`)
    .then(res => res.json())
    .then(data => {
      try {
        let meal = data.mealServiceDietInfo[1].row[0].DDISH_NM;
        document.getElementById("meal").innerHTML =
          meal.replace(/<br\/>/g,"<br>");
      } catch {
        document.getElementById("meal").innerText = "급식 없음 😢";
      }
    });
}

// 시간표
const schedules = {
  1: ["국어","수학","영어","과학","체육"],
  2: ["영어","과학","수학","국어","미술"],
  3: ["수학","국어","사회","영어","기술"]
};

function showGrade(grade) {
  let html = "<ul>";
  schedules[grade].forEach(sub => {
    html += `<li>${sub}</li>`;
  });
  html += "</ul>";

  document.getElementById("timetable").innerHTML = html;
}

updateDateText();
</script>

</body>
</html>
