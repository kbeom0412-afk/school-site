<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>욕지중학교</title>

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  background-color:#f5f5f5;
}

/* 상단 */
.header {
  background-color: #4facfe;
  color:white;
  padding:30px;
  font-size:30px;
  font-weight:bold;
}

/* 🔥 박스 넓게 */
.container {
  display:flex;
  justify-content: space-between;
  padding:20px;
  gap:20px;
}

.box {
  background:white;
  border:1px solid #ddd;
  padding:20px;
  border-radius:10px;
  width:50%;
}

/* 버튼 */
button {
  margin:5px;
  padding:10px 15px;
  border:none;
  background-color: #4facfe;
  color:white;
  font-weight:bold;
  cursor:pointer;
  border-radius:5px;
}

button:hover {
  background-color: #2c8efc;
}

/* 날짜 선택 */
input {
  padding:8px;
  margin:10px;
}
</style>
</head>

<body>

<div class="header">
   욕지중학교
</div>

<div class="container">

  <!--  급식 -->
  <div class="box">
    <h2> 급식</h2>

    <!-- 날짜 선택 -->
    <input type="date" id="datePicker">
    <br>

    <button onclick="getMeal()">조회</button>

    <p id="meal">날짜를 선택하세요</p>
  </div>

  <!--  시간표 -->
  <div class="box">
    <h2> 시간표</h2>

    <button onclick="showGrade(1)">1학년</button>
    <button onclick="showGrade(2)">2학년</button>
    <button onclick="showGrade(3)">3학년</button>

    <div id="timetable">
      <p>학년을 선택하세요</p>
    </div>
  </div>

</div>

<script>
const API_KEY = "98d97eced24247d1bbdbedde114d3df7";

//  급식 가져오기
function getMeal() {
  const selected = document.getElementById("datePicker").value;

  if (!selected) {
    alert("날짜를 선택하세요!");
    return;
  }

  const date = selected.replace(/-/g,"");

  fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${API_KEY}&Type=json&pIndex=1&pSize=10&ATPT_OFCDC_SC_CODE=G10&SD_SCHUL_CODE=9010438&MLSV_YMD=${date}`)
  .then(res => res.json())
  .then(data => {
    try {
      let meal = data.mealServiceDietInfo[1].row[0].DDISH_NM;
      document.getElementById("meal").innerHTML = meal.replace(/<br\/>/g,"<br>");
    } catch {
      document.getElementById("meal").innerText = "급식 없음";
    }
  });
}

//  시간표
const schedules = {
  1: ["국어", "수학", "영어", "과학", "체육"],
  2: ["영어", "과학", "수학", "국어", "미술"],
  3: ["수학", "국어", "사회", "영어", "기술"]
};

function showGrade(grade) {
  let html = "";

  schedules[grade].forEach((subject, index) => {
    html += `<p>${index+1}교시 - ${subject}</p>`;
  });

  document.getElementById("timetable").innerHTML = html;
}
</script>

</body>
</html>
